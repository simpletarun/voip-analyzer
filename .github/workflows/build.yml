name: Build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -e .
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller cutter.spec --noconfirm
        shell: cmd
      - name: Verify build output
        run: |
          if not exist "dist\cutter\cutter.exe" (
            echo ERROR: cutter.exe not found
            exit /b 1
          )
          for %%F in ("dist\cutter\cutter.exe") do (
            echo cutter.exe size: %%~zF bytes
            if %%~zF LSS 5000000 (
              echo ERROR: cutter.exe too small (likely corrupted)
              exit /b 1
            )
          )
        shell: cmd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cutter-windows
          path: dist/cutter

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - name: Install deps
        run: |
          pip install -e .
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller cutter.spec --noconfirm
        continue-on-error: true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cutter-linux
          path: dist/cutter

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -e .
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller cutter.spec --noconfirm
        continue-on-error: true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cutter-macos
          path: dist/cutter
